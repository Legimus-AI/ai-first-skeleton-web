name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Component repo depends on @repo/shared (workspace).
      # Neither pnpm nor npm can install with workspace:* deps, so download Biome directly.
      - name: Install Biome
        env:
          BIOME_VERSION: "2.4.4"
        run: |
          curl -sSfL "https://github.com/biomejs/biome/releases/download/%40biomejs%2Fbiome%40${BIOME_VERSION}/biome-linux-x64" -o biome
          chmod +x biome

      - name: Lint
        run: ./biome check src
