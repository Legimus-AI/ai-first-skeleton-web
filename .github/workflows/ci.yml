name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Component repo depends on @repo/shared (workspace).
      # Install only Biome as a standalone tool for linting.
      - name: Install Biome
        run: pnpm add -D @biomejs/biome

      - name: Lint
        run: npx biome check src
