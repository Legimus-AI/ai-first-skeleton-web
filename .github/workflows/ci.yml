name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Component repo — no lock file. Install without frozen-lockfile.
      - run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      # Typecheck skipped: requires @repo/shared workspace (only available in monorepo).
      # Full typecheck runs in the parent monorepo CI.
