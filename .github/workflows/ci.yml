name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Component repo depends on @repo/shared (workspace).
      # Neither pnpm nor npm can install with workspace:* deps, so download Biome directly.
      - name: Install Biome
        env:
          BIOME_VERSION: "2.4.7"
        run: |
          curl -sSfL "https://github.com/biomejs/biome/releases/download/%40biomejs%2Fbiome%40${BIOME_VERSION}/biome-linux-x64" -o biome
          chmod +x biome

      - name: Lint
        run: ./biome check src

  # ─── Why tests are NOT run here ───────────────────────────────────────
  # This skeleton depends on @repo/shared (workspace:*), which means
  # `pnpm install` fails outside the monorepo context. Biome can be
  # downloaded as a standalone binary (see above), but vitest, jsdom,
  # React, and all other deps require a full node_modules install.
  #
  # Tests follow a branch-based strategy in the MONOREPO CI instead:
  #   - dev branch  → vitest --changed origin/dev --run --passWithNoTests
  #   - main branch → vitest run --coverage --passWithNoTests (full suite)
  #
  # If this skeleton is ever extracted into a standalone repo (replacing
  # workspace:* with published package versions), add a test job here
  # mirroring that same pattern.
  # ──────────────────────────────────────────────────────────────────────
